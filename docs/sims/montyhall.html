<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;}
  #root{padding:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="montyhall.bundle.js"></script>
<script>
(function(){
  function report(){
    var h = Math.ceil(document.body.scrollHeight);
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type:"montyhall-height", height:h }, "*");
    }
  }
  window.addEventListener("load", report);
  if (window.ResizeObserver){ new ResizeObserver(report).observe(document.body); }
  setTimeout(report, 300); setTimeout(report, 1200);
})();
</script>
</body>
</html>
