<!DOCTYPE html>
<!-- 소유권자: 질럿(복원팀) | 사용자: 질럿 -->
<!-- Date: 2026-06-23 (원본 enook 106·108·110p 앱 충실 재구현, 표집분포 앱과 통합 스타일) -->
<!-- 통사사복원소 — 3.3절 부트스트랩(평균) 시뮬레이터.
     표본 textarea(기본데이터 로드) / 표본 히스토그램(이중축 겹침=보라, x̄·s, 파란세모=표본평균·빨간세모=붓스트랩표본평균) /
     붓스트랩 표본 추출 / 붓스트랩 분포(핑크, 평균·표준편차, 초록세모=표본평균·빨간세모=붓스트랩표본평균). self-host, 외부라이브러리 0. -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>부트스트랩 시뮬레이터 (평균)</title>
<style>
  :root { --green:#dc3545; --line:#d9dcdf; --ink:#333; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; color:var(--ink); margin:0; padding:18px; background:#fff; }
  .wrap { max-width:820px; margin:0 auto; }
  .lab { font-weight:700; font-size:.9rem; margin:4px 0; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:8px 0; }
  button { background:var(--green); color:#fff; border:none; border-radius:5px; padding:6px 13px; cursor:pointer; font-size:.88rem; }
  button:hover { filter:brightness(1.06); }
  button.ghost { background:#fff; color:#dc3545; border:1px solid #e3b6bb; }
  input[type=text]{ width:64px; padding:5px 8px; border:1px solid var(--line); border-radius:5px; font-size:.88rem; font-weight:700; text-align:center; }
  .mvar { font-family:'Cambria Math','Latin Modern Math',Georgia,serif; font-style:italic; }
  textarea { width:100%; border:1px solid var(--line); border-radius:5px; padding:8px 10px; font-family:ui-monospace,monospace; font-size:.82rem; line-height:1.7; color:#444; resize:vertical; }
  #sampleBox { height:124px; } #lastBoot { height:64px; margin-top:6px; }
  .chart { background:#faf7f8; border:1px solid #efe2e4; border-radius:10px; margin-top:8px; padding:12px 10px 8px; }
  .htitle { text-align:center; font-size:1.12rem; font-weight:700; }
  .hsub { text-align:center; font-size:.82rem; color:#777; }
  canvas { width:100%; height:300px; display:block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="lab">표본</div>
  <textarea id="sampleBox" placeholder="표본 데이터를 공백·줄바꿈·쉼표로 구분하여 입력하세요"></textarea>
  <div class="row"><button onclick="drawTop()">표본 히스토그램</button>
    <span class="lab" style="margin:0">계급 크기:</span><input type="text" id="bw1" value="10" onchange="drawTop()"></div>
  <div class="chart"><div class="htitle" id="topTitle"></div><canvas id="topCv"></canvas></div>

  <div class="row"><span class="lab" style="margin:0">붓스트랩 표본 추출:</span>
    <button onclick="boot(1)">1회</button><button onclick="boot(10)">10회</button>
    <button onclick="boot(100)">100회</button><button onclick="boot(1000)">1000회</button>
    <button class="ghost" onclick="resetBoot()">reset</button></div>
  <textarea id="lastBoot" readonly placeholder="가장 최근에 뽑은 붓스트랩 표본이 여기에 표시됩니다"></textarea>

  <div class="chart"><div class="htitle" id="botTitle">붓스트랩 표본을 추출하세요</div>
    <div class="hsub" id="botSub">추출 횟수: 0</div><canvas id="botCv"></canvas></div>
</div>

<script>
const MAXN=100000;
const DEFAULT_SAMPLE="15,60,45,10,30,60,45,10,25,15,45,50,15,30,30,20,5,45,20,20,20,40,30,40,25,8,15,20,45,35,40,20,20,50,10,45,10,20,5,7,40,30,10,32,40,20,45,70,10,45,30,30,30,50,7,20,30,60,27,1,13,35,15,30,25,20,10,15,32,10,20,20,15,35,30,28,6,15,5,30,35,60,30,50,5,10,30,35,3,25,30,45,180,15,30,50,20,20,45,45,45,10,40,35,15,40,30,35,15,20,25,25,3,5,90,23,20,40,25,45,25,30,10,45,30,25,20,45,9,20,45,45,20,30,10,15,50,10,45,5,2,30,30,7,18,10,25,45,120,45,30,7,35,25,20,3,60,12,30,35,5,10,20,28,40,30,15,32,60,20,15,20,2,40,45,90,20,15,30,45,20,25,15,55,15,30,45,40,90,30,80,30,30,90,23,12,30,25,1,25,30,15,45,75,15,40,20,35,15,80,10,30,15,10,35,50,35,30,35,2,10,30,25,10,25,7,45,60,33,25,15,13,10,20,25,15,40,30,2,20,46,30,30,45,25,20,17,60,15,15,15,30,10,30,20,30,75,20,10,15,20,15,30,30,15,20,20,10,22,10,30,15,181,35,30,35,25,5,30,15,14,60,35,5,25,30,60,20,45,16,25,13,35,45,45,15,45,5,15,40,30,60,3,30,120,45,7,1,25,45,45,20,35,10,25,30,30,25,30,45,30,25,45,27,20,15,40,10,22,90,20,45,15,15,25,45,80,20,20,10,10,45,30,25,45,45,40,38,25,20,15,10,15,20,120,20,15,25,30,45,35,25,7,45,20,20,45,20,45,20,15,30,15,35,90,5,20,40,35,10,23,60,15,45,5,25,20,10,20,25,45,45,45,18,15,25,3,20,15,10,18,20,30,15,10,60,20,10,15,30,12,10,25,20,5,20,3,30,30,45,20,35,10,30,30,40,60,60,40,30,10,60,12,30,35,15,7,10,30,10,10,15,15,10,80,15,35,25,50,20,60,40,30,20,20,60,30,25,15,60,30,20,35,15,55,40,25,25,45,5,1,15,30,25,45,45,22,30,30,1,60,20,45,15,30,30,45,30,63,30,34,15,30,20,65,5,12,60,34,25";
let SAMPLE=[], sMean=0, sSD=0, lastBootArr=null, bootMeans=[], lastBootMean=null, animId=null;
function parse(s){ return s.split(/[\s,]+/).map(Number).filter(x=>!isNaN(x)); }
function mean(a){ let s=0; for(const x of a) s+=x; return s/a.length; }
function sdSample(a){ if(a.length<2) return 0; const m=mean(a); let s=0; for(const x of a) s+=(x-m)*(x-m); return Math.sqrt(s/(a.length-1)); }
function minOf(a){ let m=a[0]; for(const x of a) if(x<m)m=x; return m; }
function maxOf(a){ let m=a[0]; for(const x of a) if(x>m)m=x; return m; }
function cancelAnim(){ if(animId){ cancelAnimationFrame(animId); animId=null; } }
function fmt(x){ return (+x.toFixed(3)).toString(); }
function niceNum(x){ if(!(x>0)) return 1; const mag=Math.pow(10,Math.floor(Math.log10(x))), f=x/mag; return (f<1.5?1:f<3?2:f<7?5:10)*mag; }
function getBin(id,def){ let v=parseFloat(document.getElementById(id).value); return (v>0)?v:def; }
// numpy/seaborn 'auto' = max(Sturges, Freedman-Diaconis) 계급 수. 반환 = 계급너비의 1/n 배수 k (이산 s/n 정렬).
function autoBinK(data, n){
  const N=data.length; if(N<2) return 1;
  const s=[...data].sort((a,b)=>a-b), rng=s[N-1]-s[0]; if(rng<=0) return 1;
  const sturges=Math.ceil(Math.log2(N)+1);
  const q1=s[Math.floor((N-1)*0.25)], q3=s[Math.floor((N-1)*0.75)], iqr=Math.max(0,q3-q1);
  const fdBins=iqr>0 ? Math.ceil(rng/(2*iqr/Math.cbrt(N))) : sturges;
  const bins=Math.max(sturges, fdBins);
  return Math.max(1, Math.round(rng/bins*n));
}
function hist(arr,d0,binW,bins){ const c=new Array(bins).fill(0);
  for(const x of arr){ let b=Math.floor((x-d0)/binW); if(b<0)b=0; if(b>=bins)b=bins-1; c[b]++; } return c; }
function setup(id){ const cv=document.getElementById(id), dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth, H=cv.clientHeight; cv.width=W*dpr; cv.height=H*dpr;
  const c=cv.getContext('2d'); c.scale(dpr,dpr); c.clearRect(0,0,W,H); return {c,W,H}; }
function tri(c,x,y0,col){ c.fillStyle=col; c.beginPath(); c.moveTo(x,y0-1); c.lineTo(x-6,y0+10); c.lineTo(x+6,y0+10); c.closePath(); c.fill(); }

function loadSample(){ SAMPLE=parse(document.getElementById('sampleBox').value);
  if(SAMPLE.length<2) return false; sMean=mean(SAMPLE); sSD=sdSample(SAMPLE); return true; }

// ── 표본 히스토그램: 이중축(표본 빈도 왼축 / 붓스트랩 표본 빈도 오른축), 전폭 겹침(보라) ──
function drawTop(){
  if(!loadSample()){ alert('표본 데이터를 2개 이상 입력하세요.'); return; }
  renderTop();
}
function renderTop(){
  const {c,W,H}=setup('topCv');
  const padL=46,padR=46,padT=24,padB=34,pW=W-padL-padR,pH=H-padT-padB,x0=padL,y0=padT+pH;
  if(SAMPLE.length<2){ c.strokeStyle='#cdd3da'; c.beginPath(); c.moveTo(x0,y0); c.lineTo(x0+pW,y0); c.stroke(); return; }
  document.getElementById('topTitle').innerHTML=`<span class="mvar">x̄</span> = ${fmt(sMean)}, &nbsp;&nbsp; <span class="mvar">s</span> = ${fmt(sSD)}`;
  const binW=getBin('bw1', niceNum((maxOf(SAMPLE)-minOf(SAMPLE))/12));
  let lo=minOf(SAMPLE), hi=maxOf(SAMPLE);
  if(lastBootArr){ lo=Math.min(lo,minOf(lastBootArr)); hi=Math.max(hi,maxOf(lastBootArr)); }
  const d0=Math.floor(lo/binW)*binW, hiE=Math.ceil((hi+binW)/binW)*binW, bins=Math.max(1,Math.min(400,Math.round((hiE-d0)/binW))), dom=bins*binW;
  const sCt=hist(SAMPLE,d0,binW,bins), bCt=lastBootArr?hist(lastBootArr,d0,binW,bins):null;
  const sYmax=niceNum(maxOf(sCt)||1)*1.05, bYmax=bCt?niceNum(maxOf(bCt)||1)*1.05:1;
  const X=v=>x0+(v-d0)/dom*pW, bw=pW/bins;
  c.font='11px sans-serif'; c.lineWidth=1;
  for(let k=0;k<=5;k++){ const y=y0-pH*k/5; c.strokeStyle='#e7eee9'; c.beginPath(); c.moveTo(x0,y); c.lineTo(x0+pW,y); c.stroke();
    c.fillStyle='rgba(220,53,69,.7)'; c.textAlign='right'; c.fillText(String(Math.round(sYmax*k/5)), x0-6, y+4);
    if(bCt){ c.fillStyle='#dc3545'; c.textAlign='left'; c.fillText(String(Math.round(bYmax*k/5)), x0+pW+6, y+4); } }
  // 표본 막대(전폭 반투명 파랑)
  c.fillStyle='rgba(220,53,69,.22)';
  for(let i=0;i<bins;i++){ if(!sCt[i])continue; const h=sCt[i]/sYmax*pH, x=x0+i*bw; c.fillRect(x, y0-h, bw, h); }
  // 붓스트랩 표본 막대(같은 전폭 반투명 자홍 → 보라). 품지 않음
  if(bCt){ c.fillStyle='rgba(220,53,69,.5)';
    for(let i=0;i<bins;i++){ if(!bCt[i])continue; const h=bCt[i]/bYmax*pH, x=x0+i*bw; c.fillRect(x, y0-h, bw, h); } }
  c.save(); c.translate(13,padT+pH/2); c.rotate(-Math.PI/2); c.textAlign='center'; c.fillStyle='rgba(220,53,69,.7)'; c.font='11px sans-serif'; c.fillText('빈도 (표본)',0,0); c.restore();
  if(bCt){ c.save(); c.translate(W-13,padT+pH/2); c.rotate(Math.PI/2); c.textAlign='center'; c.fillStyle='#dc3545'; c.fillText('빈도 (붓스트랩 표본)',0,0); c.restore(); }
  c.strokeStyle='#cdd3da'; c.lineWidth=1; c.beginPath(); c.moveTo(x0,y0); c.lineTo(x0+pW,y0); c.stroke();
  const dec=(hi-lo)>=5?0:1; c.fillStyle='#8a8f8a'; c.textAlign='center';
  { const ts=niceNum(dom/5); for(let v=Math.ceil((d0-1e-9)/ts)*ts; v<=d0+dom+1e-9; v+=ts) c.fillText(String(Math.round(v)), X(v), y0+15); }
  if(X(sMean)>=x0-2&&X(sMean)<=x0+pW+2) tri(c,X(sMean),y0,'#dc3545');             // 표본 평균(파랑)
  if(lastBootMean!=null && X(lastBootMean)>=x0-2&&X(lastBootMean)<=x0+pW+2) tri(c,X(lastBootMean),y0,'rgba(220,53,69,.42)'); // 붓스트랩 평균(빨강)
}

function addBoot(k){ const n=SAMPLE.length; let arr=null;
  for(let t=0;t<k;t++){ arr=new Array(n); let s=0; for(let i=0;i<n;i++){ const v=SAMPLE[(Math.random()*n)|0]; arr[i]=v; s+=v; } bootMeans.push(s/n); }
  lastBootArr=arr; lastBootMean=bootMeans[bootMeans.length-1];
  document.getElementById('lastBoot').value=arr.join('  '); }
function boot(times){
  if(!loadSample()){ alert('먼저 표본을 입력하고 표본 히스토그램을 그리세요.'); return; }
  cancelAnim();
  let remaining=Math.min(times, MAXN-bootMeans.length);
  if(remaining<=0){ document.getElementById('botSub').textContent=`추출 횟수: ${bootMeans.length.toLocaleString()} (상한 도달 — reset 후 진행)`; return; }
  if(times===1){ addBoot(1); renderTop(); renderDist(); return; }
  const frames=Math.min(remaining,120), per=Math.ceil(remaining/frames);
  (function step(){ const kk=Math.min(per,remaining); addBoot(kk); remaining-=kk; renderTop(); renderDist();
    if(remaining>0) animId=requestAnimationFrame(step); else animId=null; })();
}
function resetBoot(){ cancelAnim(); bootMeans=[]; lastBootArr=null; lastBootMean=null;
  document.getElementById('lastBoot').value='';
  document.getElementById('botTitle').textContent='붓스트랩 표본을 추출하세요';
  document.getElementById('botSub').textContent='추출 횟수: 0'; renderTop(); renderDist(); }

// ── 붓스트랩 분포 ──
function renderDist(){
  const {c,W,H}=setup('botCv');
  const padL=46,padR=14,padT=8,padB=34,pW=W-padL-padR,pH=H-padT-padB,x0=padL,y0=padT+pH;
  if(bootMeans.length){ document.getElementById('botTitle').innerHTML=`붓스트랩 분포 — 평균 = ${mean(bootMeans).toFixed(3)}, 표준편차 = ${sdSample(bootMeans).toFixed(3)}`;
    document.getElementById('botSub').textContent=`추출 횟수: ${bootMeans.length.toLocaleString()}`; }
  if(!bootMeans.length){ c.strokeStyle='#cdd3da'; c.beginPath(); c.moveTo(x0,y0); c.lineTo(x0+pW,y0); c.stroke(); return; }
  const n=SAMPLE.length;
  let lo=minOf(bootMeans), hi=maxOf(bootMeans); lo=Math.min(lo,sMean); hi=Math.max(hi,sMean);
  if(lastBootMean!=null){ lo=Math.min(lo,lastBootMean); hi=Math.max(hi,lastBootMean); }
  // 붓스트랩 평균 s/n (정수 데이터면 1/n 간격). 계급 수 = numpy/seaborn 'auto'(Sturges/FD) 자동, 1/n 배수 snap.
  const cMin=Math.round(lo*n), cMax=Math.round(hi*n), k=autoBinK(bootMeans, n);
  const binW=k/n, d0=(cMin-0.5)/n, bins=Math.max(1,Math.ceil((cMax-cMin+1)/k)), dom=bins*binW;
  const ct=hist(bootMeans,d0,binW,bins), ymax=niceNum(maxOf(ct)||1)*1.05;
  const X=v=>x0+(v-d0)/dom*pW, bw=pW/bins;
  c.font='11px sans-serif'; c.lineWidth=1; c.textAlign='right';
  for(let k=0;k<=5;k++){ const y=y0-pH*k/5; c.strokeStyle='#e7eee9'; c.beginPath(); c.moveTo(x0,y); c.lineTo(x0+pW,y); c.stroke();
    c.fillStyle='#8a8f8a'; c.fillText(String(Math.round(ymax*k/5)), x0-6, y+4); }
  c.save(); c.translate(14,padT+pH/2); c.rotate(-Math.PI/2); c.textAlign='center'; c.fillStyle='#666'; c.fillText('빈도',0,0); c.restore();
  c.fillStyle='rgba(220,53,69,.45)';
  for(let i=0;i<bins;i++){ if(!ct[i])continue; const h=ct[i]/ymax*pH, x=x0+i*bw; c.fillRect(x, y0-h, Math.max(1,bw-1), h); }
  c.strokeStyle='#cdd3da'; c.lineWidth=1; c.beginPath(); c.moveTo(x0,y0); c.lineTo(x0+pW,y0); c.stroke();
  const dec=(hi-lo)>=5?0:(hi-lo)>=0.5?1:2; c.fillStyle='#8a8f8a'; c.textAlign='center';
  { const ts=niceNum(dom/5); for(let v=Math.ceil((d0-1e-9)/ts)*ts; v<=d0+dom+1e-9; v+=ts) c.fillText((+v.toFixed(dec)).toString(), X(v), y0+15); }
  if(X(sMean)>=x0-2&&X(sMean)<=x0+pW+2) tri(c,X(sMean),y0,'#dc3545');                 // 표본 평균(초록)
  if(lastBootMean!=null && X(lastBootMean)>=x0-2&&X(lastBootMean)<=x0+pW+2) tri(c,X(lastBootMean),y0,'rgba(220,53,69,.42)'); // 붓스트랩 평균(빨강)
}

// 기본 빈칸 시작. URL에 ?prefill 있을 때만 통근 데이터(page 110 원본 자동입력) 채움.
document.getElementById('sampleBox').value = new URLSearchParams(location.search).has('prefill') ? DEFAULT_SAMPLE : '';
loadSample(); renderTop(); renderDist();
window.addEventListener('resize', ()=>{ renderTop(); renderDist(); });
</script>
</body>
</html>
