<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>R 계산기</title>

<!-- CodeMirror 5 (코드 에디터: 줄번호 · R 구문강조 · 깔끔한 선택) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2430; --muted:#8a93a6;
    --line:#e4e8f0; --accent:#3b5bdb;
    --result:#e8590c; --err:#d6336c; --pane:#fbfcfe;
    --mono:"SF Mono",Menlo,Consolas,"DejaVu Sans Mono","D2Coding",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:24px;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  .app{
    max-width:1100px;margin:0 auto;background:var(--card);
    border:1px solid var(--line);border-radius:16px;
    box-shadow:0 10px 30px -12px rgba(31,36,48,.18);overflow:hidden;
  }

  /* ── 헤더 (제목만) ── */
  .toolbar{
    display:flex;align-items:center;
    padding:14px 18px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#ffffff,#fafbff);
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:.2px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:#2b73d6;box-shadow:0 0 0 3px rgba(43,115,214,.16)}
  .brand small{font-weight:600;color:var(--muted);font-size:12px;margin-left:2px}

  /* ── 좌우 2단 ── */
  .panes{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .pane{padding:16px 18px;min-width:0;display:flex;flex-direction:column}
  .pane.input{border-right:1px solid var(--line)}
  .pane-head{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:800;letter-spacing:.8px;color:var(--muted);
    text-transform:uppercase;margin-bottom:9px;
  }
  .pane-head .tag{
    font-size:11px;font-weight:700;color:#5566aa;background:#eef1fb;
    border:1px solid #e0e5f7;border-radius:999px;padding:1px 9px;letter-spacing:0;
  }

  /* ── CodeMirror 에디터 ── */
  .CodeMirror{
    height:300px;
    border:1px solid var(--line);border-radius:12px 12px 0 0;
    font-family:var(--mono);font-size:16px;line-height:1.6;
    background:var(--pane);color:var(--ink);
  }
  .CodeMirror-focused{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.16);background:#fff}
  .CodeMirror-gutters{border-right:1px solid var(--line);background:#f6f8fd}
  .CodeMirror-linenumber{color:#b6bfd2}
  .CodeMirror-selected{background:#cfe0ff !important}
  .CodeMirror-focused .CodeMirror-selected{background:#bcd4ff !important}

  .editor-foot{
    display:flex;align-items:center;justify-content:space-between;
    height:34px;padding:0 12px;border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;
    background:#f6f8fd;font-family:var(--mono);font-size:12px;color:var(--muted);
  }
  .editor-foot .run-mode{font-family:var(--sans);font-weight:700;color:#5566aa}

  /* 출력 높이 = 에디터(300) + 풋바(34) → 좌우 박스 하단 정렬 */
  .output{
    height:334px;overflow:auto;padding:14px 16px;
    border:1px solid var(--line);border-radius:12px;background:var(--pane);
    font-family:var(--mono);font-size:16px;line-height:1.6;
    white-space:pre-wrap;overflow-wrap:break-word;
  }
  .output .placeholder{color:var(--muted)}
  .output .result{color:var(--result);font-weight:600}
  .output .err{color:var(--err)}

  /* ── 상태바 ── */
  .statusbar{
    display:flex;align-items:center;gap:10px;
    padding:11px 18px;border-top:1px solid var(--line);
    background:#fafbff;font-size:13px;color:var(--muted);
  }
  .statusbar .ok{color:#2f9e44}
  .statusbar .load{color:#e8590c}
  .hint{margin-left:auto}
  .hint b{color:#5566aa}

  @media (max-width:720px){
    .panes{grid-template-columns:1fr}
    .pane.input{border-right:none;border-bottom:1px solid var(--line)}
    .CodeMirror{height:200px}.output{height:234px}
  }
</style>
</head>
<body>
<div class="app">

  <div class="toolbar">
    <span class="brand"><span class="dot"></span>R 계산기 <small>WebR</small></span>
  </div>

  <div class="panes">
    <div class="pane input">
      <div class="pane-head">계산식 <span class="tag">R 코드</span></div>
      <div id="editor"></div>
      <div class="editor-foot">
        <span id="lineinfo">Ln 1, Col 1</span>
        <span class="run-mode" id="runmode">줄 실행</span>
      </div>
    </div>
    <div class="pane output-pane">
      <div class="pane-head">결과 <span class="tag">출력</span></div>
      <div id="output" class="output"><span class="placeholder">R 엔진을 불러오는 중입니다…</span></div>
    </div>
  </div>

  <div class="statusbar">
    <span id="status" class="load">R 엔진 로딩 중… (최초 1회, 수십 초)</span>
    <span class="hint"><b>드래그</b>+<b>Shift+Enter</b> 선택 실행 · 커서만 두면 <b>그 줄</b> 실행 · <b>Enter</b> 줄바꿈</span>
  </div>

</div>

<!-- CodeMirror 코어 + R 모드 (module 보다 먼저 로드되어 전역 CodeMirror 제공) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/r/r.min.js"></script>

<script type="module">
import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

const EXAMPLE = `x <- sqrt(0.4*0.6/23)\nprint(x+11)\nprint(x+12)\nprint(x+13)`;

const outputEl = document.getElementById('output');
const statusEl = document.getElementById('status');
const lineInfo = document.getElementById('lineinfo');
const runMode  = document.getElementById('runmode');

let webR, shelter, ready = false;

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function stripIndex(line){ return line.replace(/^\[1\] /, ''); }   // 교재 표기: 스칼라 "[1] " 제거
function setStatus(text, cls){ statusEl.className = cls || ''; statusEl.textContent = text; }

/* ── CodeMirror 초기화 ── */
const cm = CodeMirror(document.getElementById('editor'), {
  value: EXAMPLE,
  mode: 'r',
  lineNumbers: true,
  lineWrapping: true,
  smartIndent: false,
  extraKeys: {
    'Shift-Enter': () => { if(ready) run(); },
    'Tab': cmInst => cmInst.replaceSelection('  ')
  }
});

function updateInfo(){
  const c = cm.getCursor();
  lineInfo.textContent = `Ln ${c.line + 1}, Col ${c.ch + 1}`;
  runMode.textContent = cm.somethingSelected() ? '선택 실행' : '줄 실행';
}
cm.on('cursorActivity', updateInfo);
updateInfo();

/* ── 실행 대상: 선택 있으면 선택분 / 없으면 커서가 놓인 줄 (web-terminal 방식) ── */
function getCodeToRun(){
  if(cm.somethingSelected()) return { code: cm.getSelection(), isLine: false };
  const line = cm.getCursor().line;
  return { code: cm.getLine(line), isLine: true };
}

/* ── 실행 후 다음 비어있지 않은 줄로 커서 이동 (web-terminal 방식) ── */
function advanceCursor(){
  const endLine = cm.getCursor('end').line;
  const last = cm.lineCount();
  let target = -1;
  for(let i = endLine + 1; i < last; i++){
    if(cm.getLine(i).trim().length > 0){ target = i; break; }
  }
  if(target !== -1){
    cm.setCursor({ line: target, ch: 0 });
  } else {
    const ll = last - 1;
    cm.setCursor({ line: ll, ch: cm.getLine(ll).length });
  }
  updateInfo();
}

async function init(){
  webR = new WebR();
  await webR.init();
  shelter = await new webR.Shelter();
  ready = true;
  outputEl.innerHTML = '<span class="placeholder">결과가 여기에 표시됩니다.</span>';
  setStatus('R 준비 완료', 'ok');
  cm.focus();
}

async function run(){
  const sel = getCodeToRun();
  const code = sel.code;
  if(!code.trim()){ if(sel.isLine) advanceCursor(); return; }

  setStatus('실행 중…', 'load');
  let html = '';
  try {
    const cap = await shelter.captureR(code, {
      withAutoprint: true, captureStreams: true, captureConditions: false
    });
    const out = cap.output.map(o => {
      const cls = (o.type === 'stderr') ? 'err' : 'result';
      return '<span class="'+cls+'">' + esc(stripIndex(String(o.data))) + '</span>';
    }).join('\n');
    html = out || '<span class="placeholder">(출력 없음)</span>';
  } catch(e){
    html = '<span class="err">오류: ' + esc(String(e && e.message ? e.message : e)) + '</span>';
  } finally {
    shelter.purge();
  }

  outputEl.innerHTML = html;     // 숫자만 깔끔히 — 실행할 때마다 결과로 교체
  outputEl.scrollTop = 0;
  setStatus('R 준비 완료', 'ok');
  if(sel.isLine) advanceCursor();
  cm.focus();
}

init().catch(e => {
  setStatus('R 로딩 실패: ' + (e && e.message ? e.message : e), 'err');
  outputEl.innerHTML = '<span class="err">R 엔진을 불러오지 못했습니다. 네트워크 연결을 확인해 주세요.</span>';
});
</script>
</body>
</html>
